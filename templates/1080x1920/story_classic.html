<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <style>
        html { margin: 0; padding: 0; }
        body {
            margin: 0; padding: 0;
            width: 1080px;
            background: #faf3e0;
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', serif;
            position: relative;
            overflow: hidden;
        }
        .page-container {
            width: 1080px; height: 1920px;
            padding: 60px 50px 70px 50px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 36px;
            position: relative;
        }
        /* 经典绘本：四角装饰 + 顶部标题 */
        .corner { position: absolute; width: 40px; height: 40px; border: 4px solid #8b5a2b; }
        .corner.tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .corner.tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .corner.br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

        .title-bar { text-align: center; }
        .title-bar .title {
            font-size: 50px; font-weight: 700; color: #5a3a1a;
            letter-spacing: 3px; line-height: 1.3;
        }

        .image-frame {
            flex: 1; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 36px rgba(90, 58, 26, 0.2);
            border: 6px solid #fff; background: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .narration {
            min-height: 160px; display: flex; align-items: center; justify-content: center;
            padding: 0 30px; background: #fff8e7; border-radius: 10px;
            border-left: 6px solid #c9985a;
        }
        .narration .text {
            font-size: 42px; color: #4a2f15; text-align: center;
            line-height: 1.7; font-weight: 500; letter-spacing: 1px;
        }

        .footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 8px; border-top: 2px dotted #c9985a;
        }
        .page-num { font-size: 26px; color: #8b5a2b; font-weight: 600; }
        .brand { font-size: 22px; color: #8b5a2b; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="title-bar"><div class="title">{{title}}</div></div>

        <div class="image-frame"><img src="{{image}}" alt="Story"></div>

        <div class="narration"><div class="text">{{text}}</div></div>

        <div class="footer">
            <div class="page-num">{{index}} / {{page_count=8}}</div>
            <div class="brand">{{brand=Pixelle-Video}}</div>
        </div>
    </div>
</body>
</html>
