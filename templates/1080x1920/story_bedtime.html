<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <style>
        html { margin: 0; padding: 0; }
        body {
            margin: 0; padding: 0;
            width: 1080px;
            background: linear-gradient(180deg, #0a1633 0%, #142850 50%, #1f3a6a 100%);
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', serif;
            position: relative;
            overflow: hidden;
        }
        .page-container {
            width: 1080px; height: 1920px;
            padding: 80px 60px 90px 60px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 38px;
            position: relative;
        }
        /* 睡前风：大月亮 + 闪烁星 + 云朵 + Zzz 梦境 */
        .big-moon {
            position: absolute; top: 50px; right: 60px;
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffce8, #f0e8c0);
            box-shadow: 0 0 80px rgba(255, 248, 200, 0.5);
        }
        /* 月亮上的陨石坑 */
        .big-moon::before, .big-moon::after {
            content: ''; position: absolute; border-radius: 50%;
            background: rgba(200, 195, 160, 0.4);
        }
        .big-moon::before { width: 18px; height: 18px; top: 30px; left: 35px; }
        .big-moon::after { width: 12px; height: 12px; top: 60px; left: 60px; }

        .twinkle { position: absolute; background: #fff; border-radius: 50%; opacity: 0.7; }
        .twinkle.t1 { top: 60px; left: 80px; width: 5px; height: 5px; }
        .twinkle.t2 { top: 110px; left: 200px; width: 4px; height: 4px; }
        .twinkle.t3 { top: 50px; left: 350px; width: 5px; height: 5px; }
        .twinkle.t4 { top: 140px; right: 220px; width: 4px; height: 4px; }
        .twinkle.t5 { top: 90px; left: 480px; width: 3px; height: 3px; }
        .twinkle.t6 { top: 180px; left: 150px; width: 4px; height: 4px; }
        .twinkle.t7 { bottom: 350px; right: 40px; width: 4px; height: 4px; }

        /* 云朵装饰 */
        .cloud {
            position: absolute; background: rgba(200, 210, 230, 0.15);
            border-radius: 40px;
        }
        .cloud.c1 { top: 200px; left: -40px; width: 200px; height: 50px; }
        .cloud.c2 { bottom: 250px; right: -30px; width: 180px; height: 45px; }

        /* Zzz 梦境符号 */
        .zzz {
            position: absolute; top: 130px; right: 180px;
            color: rgba(200, 210, 230, 0.6);
            font-family: serif; font-style: italic;
        }
        .zzz span { display: block; line-height: 1; }
        .zzz .z1 { font-size: 24px; }
        .zzz .z2 { font-size: 32px; margin-left: 10px; }
        .zzz .z3 { font-size: 40px; margin-left: 20px; }

        .title-bar { text-align: center; position: relative; z-index: 1; }
        .title-bar .moon-icon { font-size: 32px; color: #f0e8c0; margin-bottom: 6px; }
        .title-bar .title {
            font-size: 50px; font-weight: 600; color: #d8e0f0;
            letter-spacing: 5px; line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .title-bar .deco {
            width: 70px; height: 2px; background: #6080a0;
            margin: 16px auto 0; border-radius: 1px;
        }

        .image-frame {
            flex: 1; border-radius: 18px; overflow: hidden;
            box-shadow: 0 14px 44px rgba(0, 0, 0, 0.5);
            border: 8px solid rgba(255, 255, 255, 0.18);
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 1;
        }
        .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .narration {
            min-height: 175px; display: flex; align-items: center; justify-content: center;
            padding: 0 50px; position: relative; z-index: 1;
        }
        .narration .text {
            font-size: 42px; color: #c8d4e8; text-align: center;
            line-height: 1.9; font-weight: 400; letter-spacing: 2px;
            font-style: italic;
        }

        .footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 12px; position: relative; z-index: 1;
        }
        .page-num { font-size: 26px; color: #8090b0; font-weight: 500; }
        .brand { font-size: 22px; color: #8090b0; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="big-moon"></div>
        <div class="zzz"><span class="z1">z</span><span class="z2">z</span><span class="z3">Z</span></div>
        <div class="twinkle t1"></div><div class="twinkle t2"></div>
        <div class="twinkle t3"></div><div class="twinkle t4"></div>
        <div class="twinkle t5"></div><div class="twinkle t6"></div>
        <div class="twinkle t7"></div>
        <div class="cloud c1"></div><div class="cloud c2"></div>

        <div class="title-bar">
            <div class="moon-icon">☾</div>
            <div class="title">{{title}}</div>
            <div class="deco"></div>
        </div>

        <div class="image-frame"><img src="{{image}}" alt="Story"></div>

        <div class="narration"><div class="text">{{text}}</div></div>

        <div class="footer">
            <div class="page-num">{{index}} / {{page_count=8}}</div>
            <div class="brand">{{brand=Pixelle-Video}}</div>
        </div>
    </div>
</body>
</html>
