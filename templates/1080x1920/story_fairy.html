<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <style>
        html { margin: 0; padding: 0; }
        body {
            margin: 0; padding: 0;
            width: 1080px;
            background: linear-gradient(180deg, #1a0f3a 0%, #3a1f6a 50%, #5a2f8a 100%);
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', serif;
            position: relative;
            overflow: hidden;
        }
        .page-container {
            width: 1080px; height: 1920px;
            padding: 70px 55px 80px 55px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 36px;
            position: relative;
        }
        /* 童话风：星月 + 城堡剪影 + 魔法粒子 */
        .sky-deco { position: absolute; top: 0; left: 0; right: 0; height: 300px; pointer-events: none; z-index: 0; }
        .moon-glow {
            position: absolute; top: 40px; right: 50px;
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff8d0, #ffd86b);
            box-shadow: 0 0 50px rgba(255, 216, 107, 0.6);
        }
        .star { position: absolute; color: #ffd86b; text-shadow: 0 0 8px rgba(255,216,107,0.8); }
        .star.s1 { top: 50px; left: 70px; font-size: 44px; }
        .star.s2 { top: 100px; left: 180px; font-size: 28px; }
        .star.s3 { top: 60px; left: 300px; font-size: 24px; }
        .star.s4 { top: 130px; left: 450px; font-size: 32px; }
        .star.s5 { top: 80px; right: 180px; font-size: 26px; }
        /* 城堡剪影底部装饰 */
        .castle {
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.3));
            clip-path: polygon(0% 100%, 5% 60%, 8% 60%, 10% 70%, 15% 70%, 18% 40%, 22% 40%,
                25% 55%, 30% 55%, 33% 30%, 36% 30%, 38% 45%, 42% 45%, 45% 60%, 50% 60%,
                53% 35%, 56% 35%, 58% 50%, 62% 50%, 65% 65%, 70% 65%, 73% 45%, 76% 45%,
                78% 30%, 82% 30%, 85% 55%, 90% 55%, 93% 70%, 96% 70%, 98% 60%, 100% 100%);
            opacity: 0.4;
        }
        /* 魔法粒子 */
        .sparkle { position: absolute; color: #ffd86b; opacity: 0.6; font-size: 20px; }
        .sparkle.sp1 { top: 400px; left: 30px; }
        .sparkle.sp2 { top: 600px; right: 25px; font-size: 16px; }
        .sparkle.sp3 { bottom: 300px; left: 20px; font-size: 18px; }

        .title-bar { text-align: center; position: relative; z-index: 1; }
        .title-bar .crown { font-size: 36px; color: #ffd86b; margin-bottom: 8px; }
        .title-bar .title {
            font-size: 54px; font-weight: 700; color: #ffd86b;
            letter-spacing: 4px; line-height: 1.3;
            text-shadow: 0 2px 16px rgba(255, 216, 107, 0.5);
        }

        .image-frame {
            flex: 1; border-radius: 24px; overflow: hidden;
            box-shadow: 0 16px 50px rgba(255, 216, 107, 0.25), 0 0 0 6px rgba(255, 216, 107, 0.4);
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 1;
        }
        .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .narration {
            min-height: 180px; display: flex; align-items: center; justify-content: center;
            padding: 0 40px; position: relative; z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            border: 1px solid rgba(255, 216, 107, 0.35);
        }
        .narration .text {
            font-size: 44px; color: #fff8e0; text-align: center;
            line-height: 1.8; font-weight: 500; letter-spacing: 2px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
        }

        .footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 10px; position: relative; z-index: 1;
            border-top: 1px solid rgba(255, 216, 107, 0.3);
        }
        .page-num { font-size: 26px; color: #ffd86b; font-weight: 600; }
        .brand { font-size: 22px; color: #ffd86b; opacity: 0.85; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="sky-deco">
            <div class="moon-glow"></div>
            <div class="star s1">✦</div><div class="star s2">✧</div>
            <div class="star s3">✦</div><div class="star s4">✧</div>
            <div class="star s5">✦</div>
        </div>
        <div class="castle"></div>
        <div class="sparkle sp1">✨</div><div class="sparkle sp2">✨</div>
        <div class="sparkle sp3">✨</div>

        <div class="title-bar">
            <div class="crown">♛</div>
            <div class="title">{{title}}</div>
        </div>

        <div class="image-frame"><img src="{{image}}" alt="Story"></div>

        <div class="narration"><div class="text">{{text}}</div></div>

        <div class="footer">
            <div class="page-num">{{index}} / {{page_count=8}}</div>
            <div class="brand">{{brand=Pixelle-Video}}</div>
        </div>
    </div>
</body>
</html>
