<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <style>
        html { margin: 0; padding: 0; }
        body {
            margin: 0; padding: 0;
            width: 1080px;
            background: #ffffff;
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .page-container {
            width: 1080px; height: 1920px;
            padding: 50px 40px 60px 40px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 30px;
        }
        /* 漫画风：粗黑边标题 + 对话框旁白 */
        .title-bar {
            text-align: center;
            border: 4px solid #1a1a1a;
            background: #ffd83d;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 6px 6px 0 #1a1a1a;
        }
        .title-bar .title {
            font-size: 48px; font-weight: 900; color: #1a1a1a;
            letter-spacing: 2px; line-height: 1.2;
        }

        .image-frame {
            flex: 1; border-radius: 4px; overflow: hidden;
            border: 5px solid #1a1a1a;
            box-shadow: 8px 8px 0 #1a1a1a;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* 对话框样旁白 */
        .narration {
            position: relative;
            background: #fff;
            border: 4px solid #1a1a1a;
            border-radius: 18px;
            padding: 30px 36px;
            min-height: 150px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 6px 6px 0 #1a1a1a;
        }
        .narration::before {
            content: ''; position: absolute;
            top: -20px; left: 60px;
            width: 0; height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-bottom: 24px solid #1a1a1a;
        }
        .narration::after {
            content: ''; position: absolute;
            top: -14px; left: 64px;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 18px solid #fff;
        }
        .narration .text {
            font-size: 40px; color: #1a1a1a; text-align: center;
            line-height: 1.6; font-weight: 700; letter-spacing: 1px;
        }

        .footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px;
        }
        .page-num { font-size: 26px; color: #1a1a1a; font-weight: 900; }
        .brand { font-size: 22px; color: #1a1a1a; font-weight: 700; }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="title-bar"><div class="title">{{title}}</div></div>
        <div class="image-frame"><img src="{{image}}" alt="Story"></div>
        <div class="narration"><div class="text">{{text}}</div></div>
        <div class="footer">
            <div class="page-num">{{index}} / {{page_count=8}}</div>
            <div class="brand">{{brand=Pixelle-Video}}</div>
        </div>
    </div>
</body>
</html>
