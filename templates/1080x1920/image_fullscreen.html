<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- ponytail: media 区设为 9:16 竖屏，GPT 映射到 1024x1536 竖图，铺满 1080×1920 不裁切 -->
    <meta name="template:media-width" content="1080">
    <meta name="template:media-height" content="1920">
    <meta name="viewport" content="width=1080, height=1920">
    <title>满版竖屏 - 1080x1920</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Liu+Jian+Mao+Cao&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 1080px; height: 1920px; overflow: hidden; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff;
            position: relative;
            background: transparent;
        }

        /* 满版背景图：竖图铺竖屏，cover 刚好不裁切 */
        .bg {
            position: absolute;
            inset: 0;
            background-image: url("{{image}}");
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* 顶部标题渐变遮罩 */
        .top-shade {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 360px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0));
            z-index: 1;
        }

        .title {
            position: absolute;
            top: 120px;
            width: 100%;
            text-align: center;
            font-size: 88px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 4px;
            font-family: 'Ma Shan Zheng', 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', cursive;
            text-shadow: 0 6px 22px rgba(0,0,0,0.6),
                        -2px -2px 0 #000, 2px -2px 0 #000,
                        -2px 2px 0 #000, 2px 2px 0 #000;
            z-index: 2;
        }

        /* 底部字幕渐变遮罩 */
        .bottom-shade {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 560px;
            background: linear-gradient(to top, rgba(0,0,0,0.78), rgba(0,0,0,0));
            z-index: 1;
        }

        .text {
            position: absolute;
            bottom: 220px;
            width: 100%;
            padding: 0 70px;
            text-align: center;
            font-size: 44px;
            font-weight: 400;
            line-height: 1.4;
            color: #ffffff;
            letter-spacing: 2px;
            font-family: 'Noto Serif SC', 'Noto Sans SC', 'PingFang SC', serif;
            text-shadow: 0 4px 16px rgba(0,0,0,0.7);
            z-index: 2;
        }

        /* Footer */
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 40px;
            position: absolute;
            bottom: 50px;
            color: #fff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000,
                        -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 2;
        }

        .author { display: flex; flex-direction: column; gap: 6px; letter-spacing: 2px; }
        .author-name { font-size: 30px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .author-mark { width: 8px; height: 8px; }
        .author-desc { font-size: 22px; line-height: 1.3; font-weight: 400; }

        .logo-section { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .logo { font-size: 24px; font-weight: 500; }
        .logo-marks { display: flex; gap: 5px; }
        .logo-mark { width: 6px; height: 6px; border-radius: 50%; background: rgba(149, 165, 166, 0.45); }
        .logo-mark.active { background: rgba(149, 165, 166, 0.75); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="top-shade"></div>
    <div class="title">{{title}}</div>
    <div class="bottom-shade"></div>
    <div class="text">{{text}}</div>
    <div class="footer">
        <div class="author">
            <div class="author-name">
                <span class="author-mark"></span>
                <div class="logo">{{author=@Pixelle.AI}}</div>
            </div>
            <div class="author-desc">{{describe=Open Source Omnimodal AI Creative Agent}}</div>
        </div>
        <div class="logo-section">
            <div class="logo">{{brand=Pixelle-Video}}</div>
            <div class="logo-marks">
                <div class="logo-mark"></div>
                <div class="logo-mark active"></div>
                <div class="logo-mark"></div>
                <div class="logo-mark"></div>
            </div>
        </div>
    </div>
</body>
</html>
